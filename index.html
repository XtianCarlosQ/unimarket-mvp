<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#5B21B6">
  <meta name="description" content="UniMarket MVP PWA: marketplace universitario para estudiantes UNMSM.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <title>UniMarket MVP</title>
</head>
<body>
  <div class="desktop-frame">
    <header class="brand-banner">
      <div class="brand-left">
        <img src="assets/logo-bag.svg" alt="UniMarket logo">
        <div>
          <strong>UNIMARKET</strong>
          <span>Tu marketplace universitario</span>
        </div>
      </div>
      <div class="brand-copy">
        <h1>Compra, vende y apoya emprendimientos universitarios</h1>
        <p>Productos por categorías • Comunidad segura • Pagos fáciles</p>
      </div>
    </header>

    <main id="app" class="phone" aria-live="polite"></main>
  </div>

  <template id="screen-shell">
    <section class="screen">
      <div class="status-bar">
        <span>9:41</span>
        <span class="status-icons">● ● ◐</span>
      </div>
      <header class="topbar"></header>
      <section class="content"></section>
      <nav class="bottom-nav" aria-label="Navegación principal">
        <button data-nav="home" class="nav-item"><span>⌂</span><small>Inicio</small></button>
        <button data-nav="categories" class="nav-item"><span>⌕</span><small>Explorar</small></button>
        <button data-nav="publish" class="nav-item publish"><span>＋</span><small>Vender</small></button>
        <button data-nav="messages" class="nav-item"><span>✉</span><small>Mensajes</small></button>
        <button data-nav="profile" class="nav-item"><span>♙</span><small>Perfil</small></button>
      </nav>
    </section>
  </template>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
